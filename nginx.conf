# ============================================================
# Nginx 配置文件测试用例
# 包含所有可能的配置元素
# ============================================================


# 全局配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# events 块
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

# http 块
http {
    # 基础配置
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式 - 带引号的值
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # 代理缓冲
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # 客户端限制
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # FastCGI 参数
    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    fastcgi_buffer_size 64k;
    fastcgi_buffers 4 64k;

    # 限流配置
    limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # 变量映射 - map 块
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $uri $new {
        default        http://www.domain.com/home;
        /aa            http://www.domain.com/bb;
        /bb            http://www.domain.com/cc;
    }

    # Geo IP 映射
    geo $geo {
        default        0;
        127.0.0.1      1;
        192.168.1.0/24 2;
        10.0.0.0/8     3;
    }

    # 上游服务器组 - round-robin
    upstream backend {
        # 轮询
        server 192.168.1.10:8080 weight=3;
        server 192.168.1.11:8080;
        server 192.168.1.12:8080 backup;
    }

    # 上游服务器组 - ip_hash
    upstream sticky_backend {
        ip_hash;
        server 192.168.2.10:8080;
        server 192.168.2.11:8080;
        server 192.168.2.12:8080 down;
    }

    # 上游服务器组 - least_conn
    upstream leastconn_backend {
        least_conn;
        server 192.168.3.10:8080;
        server 192.168.3.11:8080;
    }

    # 主服务器配置 - HTTP
    server {
        listen       80;
        server_name  example.com www.example.com;

        # 字符集
        charset utf-8;

        # 根目录
        root /var/www/html;
        index index.html index.htm index.php;

        # 重定向 - 带正则
        if ($host = 'www.example.com') {
            return 301 https://example.com$request_uri;
        }

        # 首页 location - 精确匹配
        location = / {
            try_files $uri $uri/ =404;
        }

        # 静态文件 location - 前缀匹配
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 正则 location - 区分大小写
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # 正则 location - 不区分大小写
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }

        # 前缀匹配 - 停止正则
        location ^~ /uploads/ {
            root /var/www;
            autoindex on;
        }

        # 命名 location
        location @fallback {
            proxy_pass http://backend;
        }

        # API 代理 - 带注释的 location
        location /api/ {  # API 接口
            limit_req zone=one burst=5 nodelay;
            limit_conn addr 10;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 嵌套 location
        location /admin/ {
            # 访问控制
            allow 192.168.1.0/24;
            allow 10.0.0.0/8;
            deny all;

            # 认证
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            location /admin/dashboard/ {
                proxy_pass http://backend;
            }
        }

        # 限制 HTTP 方法
        location /upload {
            limit_except POST {
                deny all;
            }
            client_max_body_size 10m;
            proxy_pass http://backend;
        }

        # 错误页面
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # HTTPS 服务器配置
    server {
        listen       443 ssl http2;
        server_name  example.com;

        # SSL 证书
        ssl_certificate      /etc/nginx/ssl/example.com.crt;
        ssl_certificate_key  /etc/nginx/ssl/example.com.key;

        # SSL 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://backend;
        }
    }

    # 默认服务器 - 拒绝未知域名
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}

# stream 块 - TCP/UDP 代理
stream {
    # MySQL 代理
    upstream mysql_backend {
        server 192.168.10.1:3306;
        server 192.168.10.2:3306 backup;
    }

    server {
        listen 3306;
        proxy_pass mysql_backend;
        proxy_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Redis 代理
    server {
        listen 6379;
        proxy_pass 192.168.20.1:6379;
    }
}

